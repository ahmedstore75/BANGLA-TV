<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>এস এ লাইভ টিভি</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; }
        .header { background: #1f1f1f; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; border-bottom: 2px solid #ef4444; }
        
        /* একদম সিম্পল লিস্ট লেআউট */
        .channel-list { padding: 10px; }
        .channel-card {
            background: #1f1f1f;
            margin-bottom: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            border-radius: 8px;
            border: 1px solid #333;
            cursor: pointer;
        }
        .channel-card img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-right: 15px;
            background: #fff;
            border-radius: 4px;
        }
        .channel-name { font-size: 16px; font-weight: bold; }
        
        /* ড্রয়ার মেনু */
        #menu { display: none; background: #222; padding: 15px; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="toggleMenu()" style="float: left; padding: 5px 10px;">মেনু</button>
        এস এ লাইভ টিভি
    </div>

    <div id="menu">
        <div onclick="toggleTheme()" style="cursor: pointer; padding: 10px;">☀️/🌙 থিম পরিবর্তন</div>
        <div onclick="location.reload()" style="cursor: pointer; padding: 10px;">🔄 রিলোড</div>
    </div>

    <div class="channel-list" id="channelList">
        <!-- এখানে চ্যানেল লোড হবে -->
    </div>

    <script>
        function toggleMenu() {
            var m = document.getElementById('menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function toggleTheme() {
            document.body.style.background = (document.body.style.background === 'white') ? '#121212' : 'white';
            document.body.style.color = (document.body.style.color === 'black') ? 'white' : 'black';
        }

        // সহজভাবে চ্যানেল লোড করা
        async function loadChannels() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/refs/heads/main/mixiptvchannel.m3u');
                const data = await response.text();
                const lines = data.split('\n');
                let list = document.getElementById('channelList');
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        let name = lines[i].split(',')[1];
                        let logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                        let logo = logoMatch ? logoMatch[1] : '';
                        
                        let card = document.createElement('div');
                        card.className = 'channel-card';
                        card.innerHTML = `<img src="${logo}" onerror="this.style.display='none'"> <div class="channel-name">${name}</div>`;
                        list.appendChild(card);
                    }
                }
            } catch(e) {
                document.getElementById('channelList').innerHTML = "লোড করতে সমস্যা হচ্ছে";
            }
        }
        loadChannels();
    </script>
</body>
</html>
