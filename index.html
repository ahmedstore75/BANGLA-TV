<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>এস এ লাইভ টিভি</title>
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --brand-color: #ef4444; --bg-color: #030712; --panel-bg: rgba(17, 24, 39, 0.85); --text-color: #f3f4f6; --card-bg: rgba(31, 41, 55, 0.4); --border-color: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow: hidden; }

        header { background: var(--panel-bg); padding: 14px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
        
        /* মেইন কন্টেইনার */
        .app-layout { display: flex; flex-direction: column; height: calc(100vh - 70px); overflow: hidden; padding: 12px; gap: 12px; }
        
        .player-section { flex: 0 0 auto; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); }
        .main-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }

        /* ল্যাপটপ লেআউট (Side-by-Side) */
        @media (min-width: 951px) {
            .app-layout { flex-direction: row; max-width: 1400px; margin: 0 auto; }
            .player-section { flex: 2; height: fit-content; position: sticky; top: 10px; }
            .main-content { flex: 1; height: calc(100vh - 100px); }
            .controls-wrapper { display: flex !important; gap: 10px; margin-bottom: 10px; }
        }

        /* আগের সকল স্টাইল ঠিক রাখা হলো */
        .channel-row { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 16px; cursor: pointer; margin-bottom: 8px; }
        .channel-name { font-weight: 600; color: var(--brand-color); }
        .controls-wrapper { background: var(--panel-bg); padding: 10px; border-radius: 12px; display: flex; gap: 10px; }
        .category-dropdown, .search-input { flex: 1; padding: 10px; background: #1f2937; color: white; border: 1px solid var(--border-color); border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <h1>এস এ লাইভ টিভি</h1>
    </header>

    <div class="app-layout">
        <!-- ভিডিও প্লেয়ার সেকশন -->
        <div class="player-section" id="playerSection">
            <div id="videoContainer">
                <video id="live-player" class="video-js" controls preload="auto" playsinline style="width:100%; aspect-ratio: 16/9;"></video>
            </div>
            <div style="padding: 10px; text-align: center;">এখন দেখছেন: <span id="playingTitle" style="color:var(--brand-color)">কোনোটি নয়</span></div>
        </div>

        <!-- চ্যানেল লিস্ট সেকশন -->
        <div class="main-content">
            <div class="controls-wrapper">
                <select class="category-dropdown" id="categoryDropdown"><option>All Categories</option></select>
                <input type="text" class="search-input" id="searchBox" placeholder="সার্চ করুন...">
            </div>
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <!-- স্ক্রিপ্টগুলো আপনার আগের মতোই থাকবে -->
    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // আপনার পূর্ণাঙ্গ জাভাস্ক্রিপ্ট লজিক এখানে একইভাবে কাজ করবে
    </script>
</body>
</html>
