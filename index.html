<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ahammad Ali IPTV Player</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <!-- HLS.js Standard Script -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-bg: #16161a;
            --accent-color: #ff3b30;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --border-color: #2c2c2e;
            --active-item: #2c2c2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* App Container */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Sidebar / Drawer Navigation */
        .sidebar {
            width: 70px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 10;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .sidebar.expanded {
            width: 240px;
            align-items: flex-start;
            padding: 20px 15px;
        }

        .drawer-toggle {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            margin-bottom: 35px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .sidebar.expanded .drawer-toggle {
            align-self: flex-end;
            margin-right: 5px;
        }

        .drawer-menu {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
        }

        .drawer-item {
            display: flex;
            align-items: center;
            width: 100%;
            height: 50px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .drawer-item .icon-box {
            min-width: 70px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .drawer-item span {
            opacity: 0;
            pointer-events: none;
            white-space: nowrap;
            font-size: 15px;
            font-weight: 500;
            transition: opacity 0.2s ease;
        }

        .sidebar.expanded .drawer-item span {
            opacity: 1;
            pointer-events: auto;
        }

        .drawer-item:hover, .drawer-item.active {
            color: var(--text-color);
            background-color: var(--active-item);
        }

        .drawer-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            bottom: 12px;
            width: 4px;
            background-color: var(--accent-color);
            border-radius: 0 4px 4px 0;
        }

        .sidebar.expanded .drawer-item.active::before {
            top: 10px;
            bottom: 10px;
        }

        /* Main Content Window */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        /* Header Area */
        .app-header {
            height: 70px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            z-index: 5;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
        }

        .search-input {
            width: 100%;
            height: 40px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0 15px 0 45px;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }

        /* Grid Workspace Layout */
        .workspace {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            height: calc(100% - 70px);
            overflow: hidden;
        }

        /* Stage Area (Player Engine Panel) */
        .stage-panel {
            background-color: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        .video-container {
            width: 100%;
            flex: 1;
            background-color: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Custom Loading Spinner Overlay */
        .player-loader-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 8;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .player-loader-overlay.active {
            opacity: 1;
        }

        .spinner-ring {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-status-text {
            font-size: 14px;
            color: #fff;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Control Dock underneath Player */
        .control-dock {
            height: 75px;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
        }

        .meta-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .meta-logo {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .meta-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .meta-info h3 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .meta-info p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .dock-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .action-icon-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        /* Channel Deck / Playlist Column */
        .deck-panel {
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .deck-header {
            padding: 20px 25px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .deck-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .deck-scroll-zone {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Scrollbar customization */
        .deck-scroll-zone::-webkit-scrollbar {
            width: 6px;
        }
        .deck-scroll-zone::-webkit-scrollbar-track {
            background: transparent;
        }
        .deck-scroll-zone::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .channel-card {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 15px;
        }

        .channel-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        .channel-card.active {
            background-color: rgba(255, 59, 48, 0.08);
            border-color: var(--accent-color);
        }

        .card-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-thumb i {
            font-size: 18px;
            color: var(--text-muted);
        }

        .channel-card.active .card-thumb i {
            color: var(--accent-color);
        }

        .card-details {
            flex: 1;
            overflow: hidden;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
        }

        .card-group {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #30d158;
            flex-shrink: 0;
        }

        /* Responsive Layout Overrides */
        @media(max-width: 992px) {
            .workspace {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 350px;
            }
            .deck-panel {
                border-left: none;
                border-top: 1px solid var(--border-color);
            }
        }

        @media(max-width: 576px) {
            .sidebar {
                display: none;
            }
            .search-container {
                width: 160px;
            }
        }

        .video-js {
            width: 100% !important;
            height: 100% !important;
        }
        .vjs-tech {
            object-fit: contain !important;
        }
        .video-js .vjs-big-play-button {
            background-color: var(--accent-color) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 60px !important;
            height: 60px !important;
            line-height: 60px !important;
            margin-left: -30px !important;
            margin-top: -30px !important;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- Sidebar Navigation Drawer -->
    <nav class="sidebar" id="appSidebar">
        <div class="drawer-toggle" id="drawerToggleBtn">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="drawer-menu">
            <a class="drawer-item active">
                <div class="icon-box"><i class="fa-solid fa-tv"></i></div>
                <span id="langTvText">লাইভ টিভি</span>
            </a>
            <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank" class="drawer-item facebook-item">
                <div class="icon-box"><i class="fa-brands fa-facebook-messenger"></i></div>
                <span id="langFacebookText">ফেসবুক পেজ (সাপোর্ট)</span>
            </a>
        </div>
    </nav>

    <!-- Main Application Core Frame -->
    <main class="main-content">
        
        <!-- Top App Bar Header -->
        <header class="app-header">
            <div class="search-container">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="search-input" id="searchBar" placeholder="চ্যানেল খুঁজুন...">
            </div>
            <div class="header-actions">
                <button class="lang-btn" id="langToggleBtn">EN</button>
            </div>
        </header>

        <!-- Main Workspace Layout -->
        <div class="workspace">
            
            <!-- Left Workspace Box: Player Stage Frame -->
            <section class="stage-panel">
                <div class="video-container" id="videoContainerBox">
                    <video id="coreVideoPlayer" controls autoplay playsinline></video>
                    
                    <!-- Loading Overlay (Unchanged Design) -->
                    <div class="player-loader-overlay" id="playerFallbackLoader">
                        <div class="spinner-ring"></div>
                        <div class="loader-status-text" id="loaderStatusMsg">ইঞ্জিন লোড হচ্ছে...</div>
                    </div>
                </div>

                <!-- Control Dock Container Frame below Stage Panel -->
                <div class="control-dock">
                    <div class="meta-display">
                        <div class="meta-logo" id="currentStationLogo">
                            <i class="fa-solid fa-satellite-dish" style="color: var(--text-muted)"></i>
                        </div>
                        <div class="meta-info">
                            <h3 id="currentStationTitle">কোনো চ্যানেল সিলেক্ট করা নেই</h3>
                            <p id="currentStationGenre">প্লেয়ার রেডি</p>
                        </div>
                    </div>
                    <div class="dock-actions">
                        <button class="action-icon-btn" id="fullscreenToggleBtn" title="Full Screen">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Right Workspace Box: Channels Grid Playlist Deck -->
            <section class="deck-panel">
                <div class="deck-header">
                    <h2 id="langDeckTitle">চ্যানেল সমূহ</h2>
                </div>
                <div class="deck-scroll-zone" id="playlistDeckWrapper">
                    <!-- Cards injection container -->
                </div>
            </section>

        </div>
    </main>
</div>

<!-- Video.js Script Injection -->
<script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

<script>
    const githubUrl = 'https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u';
    
    let rawChannelsDatabase = [];
    let displayedChannels = [];
    let activeChannelIndex = -1;
    let currentLanguage = 'bn';
    
    // Core Engine Fallback Architecture (0 = Video.js, 1 = Hls.js, 2 = Native)
    let currentPlayerEngineMode = 0; 
    let videoJsInstance = null;
    let hlsInstance = null;
    let fallbackCycleActive = false;
    let loadingTimeout = null; // ৫ সেকেন্ড ট্র্যাকিং টাইম-আউট টাইমার
    
    const localizationDictionary = {
        bn: {
            searchPlaceholder: "চ্যানেল খুঁজুন...",
            tvText: "লাইভ টিভি",
            facebookText: "ফেসবুক পেজ (সাপোর্ট)",
            deckTitle: "চ্যানেল সমূহ",
            noSelectTitle: "কোনো চ্যানেল সিলেক্ট করা নেই",
            noSelectGenre: "প্লেয়ার রেডি",
            loaderMsg0: "ভিডিও ইঞ্জিন ১ চালু হচ্ছে...",
            loaderMsg1: "ব্যাকআপ ইঞ্জিন ২ এ কনভার্ট করা হচ্ছে...",
            loaderMsg2: "নেটিভ ইঞ্জিন ৩ দিয়ে চেষ্টা করা হচ্ছে..."
        },
        en: {
            searchPlaceholder: "Search channels...",
            tvText: "Live TV",
            facebookText: "Facebook Page (Support)",
            deckTitle: "Stations Stream List",
            noSelectTitle: "No Station Selected",
            noSelectGenre: "Player Standby",
            loaderMsg0: "Booting Engine Mode 1...",
            loaderMsg1: "Failing Over to Backup Engine 2...",
            loaderMsg2: "Engaging Native Engine 3..."
        }
    };

    const videoElement = document.getElementById('coreVideoPlayer');
    const searchBar = document.getElementById('searchBar');
    const playlistDeckWrapper = document.getElementById('playlistDeckWrapper');
    const appSidebar = document.getElementById('appSidebar');
    const drawerToggleBtn = document.getElementById('drawerToggleBtn');
    const langToggleBtn = document.getElementById('langToggleBtn');
    const currentStationTitle = document.getElementById('currentStationTitle');
    const currentStationGenre = document.getElementById('currentStationGenre');
    const currentStationLogo = document.getElementById('currentStationLogo');
    const fullscreenToggleBtn = document.getElementById('fullscreenToggleBtn');
    const playerFallbackLoader = document.getElementById('playerFallbackLoader');
    const loaderStatusMsg = document.getElementById('loaderStatusMsg');

    // ইন্টারফেস বা ইন্টারনাল মেকানিজমে বিন্দুমাত্র হাত না দিয়ে শুধু লোডিং ডিটেক্টর যুক্ত করা হয়েছে
    videoElement.addEventListener('error', function() {
        if(activeChannelIndex !== -1) handlePlayerFallbackLoop();
    });

    videoElement.addEventListener('waiting', function() {
        if (activeChannelIndex === -1) return;
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(function() {
            handlePlayerFallbackLoop();
        }, 5000); // ঠিক ৫ সেকেন্ড বাফারিং বা লোডিং এ আটকে থাকলে অটো পরবর্তী ইঞ্জিনে শিফট হবে
    });

    videoElement.addEventListener('playing', function() {
        if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
    });

    videoElement.addEventListener('pause', function() {
        if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
    });

    function handlePlayerFallbackLoop() {
        if (activeChannelIndex === -1 || displayedChannels.length === 0) return;
        
        fallbackCycleActive = true;
        currentPlayerEngineMode = (currentPlayerEngineMode + 1) % 3;
        
        const currentTargetStreamUrl = displayedChannels[activeChannelIndex].url;
        updateLoaderOverlayUI();
        destroyActiveEngines();
        
        setTimeout(() => {
            if (currentPlayerEngineMode === 0) {
                switchToVideoJsPlayer(currentTargetStreamUrl);
            } else if (currentPlayerEngineMode === 1) {
                switchToHlsBackup(currentTargetStreamUrl);
            } else if (currentPlayerEngineMode === 2) {
                switchToNativePlayer(currentTargetStreamUrl);
            }
        }, 400); 
    }

    function updateLoaderOverlayUI() {
        playerFallbackLoader.classList.add('active');
        const langScope = localizationDictionary[currentLanguage];
        if (currentPlayerEngineMode === 0) loaderStatusMsg.innerText = langScope.loaderMsg0;
        else if (currentPlayerEngineMode === 1) loaderStatusMsg.innerText = langScope.loaderMsg1;
        else if (currentPlayerEngineMode === 2) loaderStatusMsg.innerText = langScope.loaderMsg2;
    }

    function dismissLoaderOverlayUI() {
        playerFallbackLoader.classList.remove('active');
        fallbackCycleActive = false;
    }

    function destroyActiveEngines() {
        if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }

        if (videoJsInstance) {
            videoJsInstance.dispose();
            videoJsInstance = null;
            
            const restoredVideoTag = document.createElement('video');
            restoredVideoTag.id = 'coreVideoPlayer';
            restoredVideoTag.controls = true;
            restoredVideoTag.autoplay = true;
            restoredVideoTag.style.width = '100%';
            restoredVideoTag.style.height = '100%';
            
            restoredVideoTag.addEventListener('error', function() {
                if(activeChannelIndex !== -1) handlePlayerFallbackLoop();
            });
            restoredVideoTag.addEventListener('waiting', function() {
                if (activeChannelIndex === -1) return;
                if (loadingTimeout) clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(function() {
                    handlePlayerFallbackLoop();
                }, 5000);
            });
            restoredVideoTag.addEventListener('playing', function() {
                if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
            });
            restoredVideoTag.addEventListener('pause', function() {
                if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
            });

            const videoContainerBox = document.getElementById('videoContainerBox');
            videoContainerBox.innerHTML = '';
            videoContainerBox.appendChild(restoredVideoTag);
            videoContainerBox.appendChild(playerFallbackLoader);
        }
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
    }

    function switchToVideoJsPlayer(streamUrl) {
        const nativeVidEl = document.getElementById('coreVideoPlayer');
        nativeVidEl.className = 'video-js vjs-default-skin';
        
        videoJsInstance = videojs(nativeVidEl, {
            fluid: false,
            autoplay: true,
            controls: true,
            sources: [{ src: streamUrl, type: 'application/x-mpegURL' }]
        });
        
        videoJsInstance.ready(function() {
            videoJsInstance.play().catch(err => console.log("VideoJS Autoplay block bypass"));
        });

        videoJsInstance.on('waiting', function() {
            if (loadingTimeout) clearTimeout(loadingTimeout);
            loadingTimeout = setTimeout(function() {
                handlePlayerFallbackLoop();
            }, 5000);
        });

        videoJsInstance.on('playing', function() {
            if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
            dismissLoaderOverlayUI();
        });

        videoJsInstance.on('error', function() {
            handlePlayerFallbackLoop();
        });
    }

    function switchToHlsBackup(streamUrl) {
        const nativeVidEl = document.getElementById('coreVideoPlayer');
        if (Hls.isSupported()) {
            hlsInstance = new Hls({ maxMaxBufferLength: 10, liveSyncDurationCount: 3 });
            hlsInstance.loadSource(streamUrl);
            hlsInstance.attachMedia(nativeVidEl);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                nativeVidEl.play().catch(err => console.log("HLS Pipeline play capture"));
            });
            
            hlsInstance.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) handlePlayerFallbackLoop();
            });

            nativeVidEl.onplaying = function() {
                dismissLoaderOverlayUI();
            };
        } else {
            switchToNativePlayer(streamUrl);
        }
    }

    function switchToNativePlayer(streamUrl) {
        const nativeVidEl = document.getElementById('coreVideoPlayer');
        nativeVidEl.src = streamUrl;
        nativeVidEl.load();
        nativeVidEl.play().then(() => {
            dismissLoaderOverlayUI();
        }).catch(err => console.log("Native context execution handled"));
        
        nativeVidEl.onplaying = function() {
            dismissLoaderOverlayUI();
        };
    }

    function bootSelectedChannelPipeline(targetIndex) {
        if (targetIndex < 0 || targetIndex >= displayedChannels.length) return;
        
        activeChannelIndex = targetIndex;
        const channelRecord = displayedChannels[targetIndex];
        
        currentStationTitle.innerText = channelRecord.name;
        currentStationGenre.innerText = channelRecord.group || "LIVE STREAM STATION";
        
        if (channelRecord.logo) {
            currentStationLogo.innerHTML = `<img src="${channelRecord.logo}" alt="Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\'><rect width=\'40\' height=\'40\' fill=\'%232c2c2e\'/><text x=\'50%\' y=\'55%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%238e8e93\' font-size=\'12\'>TV</text></svg>'">`;
        } else {
            currentStationLogo.innerHTML = `<i class="fa-solid fa-satellite-dish" style="color: var(--text-muted)"></i>`;
        }
        
        currentPlayerEngineMode = 0;
        updateLoaderOverlayUI();
        destroyActiveEngines();
        
        const allRenderedCardsElements = playlistDeckWrapper.querySelectorAll('.channel-card');
        allRenderedCardsElements.forEach((cardNode, nodeIdx) => {
            if (nodeIdx === targetIndex) cardNode.classList.add('active');
            else cardNode.classList.remove('active');
        });
        
        switchToVideoJsPlayer(channelRecord.url);
    }

    async function loadM3uDatabaseAsyncStream() {
        try {
            playlistDeckWrapper.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;padding:40px;color:var(--text-muted)">
                    <div class="spinner-ring"></div>
                    <div>প্লেলিস্ট লোড হচ্ছে...</div>
                </div>`;
                
            const responseDataStream = await fetch(githubUrl);
            if (!responseDataStream.ok) throw new Error("Fetch runtime network exception");
            const rawM3uTextData = await responseDataStream.text();
            
            parseM3uDatasetStructure(rawM3uTextData);
            displayedChannels = [...rawChannelsDatabase];
            renderPlaylistDeckCardsUI();
            
            if (displayedChannels.length > 0) {
                bootSelectedChannelPipeline(0);
            }
        } catch (errorExceptionObject) {
            console.error(errorExceptionObject);
            playlistDeckWrapper.innerHTML = `
                <div style="padding:30px;text-align:center;color:var(--accent-color)">
                    <i class="fa-solid fa-circle-exclamation" font-size="24px"></i>
                    <p style="margin-top:10px;font-size:14px">প্লেলিস্ট লোড করতে সমস্যা হয়েছে। দয়া করে ইন্টারনেট কানেকশন চেক করুন।</p>
                </div>`;
        }
    }

    function parseM3uDatasetStructure(rawText) {
        const textLinesArray = rawText.split(/\r?\n/);
        rawChannelsDatabase = [];
        let currentMetadataObject = null;
        
        for (let i = 0; i < textLinesArray.length; i++) {
            const currentLineText = textLinesArray[i].trim();
            
            if (currentLineText.startsWith('#EXTINF:')) {
                currentMetadataObject = {};
                const logoMatchPattern = currentLineText.match(/tvg-logo="([^"]+)"/i);
                const groupMatchPattern = currentLineText.match(/group-title="([^"]+)"/i);
                
                if (logoMatchPattern) currentMetadataObject.logo = logoMatchPattern[1];
                if (groupMatchPattern) currentMetadataObject.group = groupMatchPattern[1];
                
                const commaSeparatorSplitsIndex = currentLineText.indexOf(',');
                if (commaSeparatorSplitsIndex !== -1) {
                    currentMetadataObject.name = currentLineText.substring(commaSeparatorSplitsIndex + 1).trim();
                } else {
                    currentMetadataObject.name = "Unknown Live Station Channel";
                }
            } else if (currentLineText.startsWith('http') && currentMetadataObject) {
                currentMetadataObject.url = currentLineText;
                rawChannelsDatabase.push(currentMetadataObject);
                currentMetadataObject = null;
            }
        }
    }

    function renderPlaylistDeckCardsUI() {
        playlistDeckWrapper.innerHTML = '';
        if (displayedChannels.length === 0) {
            playlistDeckWrapper.innerHTML = `
                <div style="text-align:center;padding:40px;color:var(--text-muted);font-size:14px">
                    <i class="fa-solid fa-folder-open" style="font-size:20px;margin-bottom:8px"></i>
                    <p>কোনো চ্যানেল পাওয়া যায়নি</p>
                </div>`;
            return;
        }
        
        const virtualDOMFragmentBlock = document.createDocumentFragment();
        
        displayedChannels.forEach((channelItem, loopIndex) => {
            const cardItemNode = document.createElement('div');
            cardItemNode.className = `channel-card ${loopIndex === activeChannelIndex ? 'active' : ''}`;
            
            let thumbnailElementHtmlMarkup = `<i class="fa-solid fa-tv"></i>`;
            if (channelItem.logo) {
                thumbnailElementHtmlMarkup = `<img src="${channelItem.logo}" alt="Logo" loading="lazy" onerror="this.parentNode.innerHTML='<i class=\"fa-solid fa-tv\"></i>'">`;
            }
            
            cardItemNode.innerHTML = `
                <div class="card-thumb">${thumbnailElementHtmlMarkup}</div>
                <div class="card-details">
                    <div class="card-title">${channelItem.name}</div>
                    <div class="card-group">${channelItem.group || "Live Stream"}</div>
                </div>
                <div class="card-status-indicator"></div>
            `;
            
            cardItemNode.addEventListener('click', () => {
                if (fallbackCycleActive) return; 
                bootSelectedChannelPipeline(loopIndex);
            });
            
            virtualDOMFragmentBlock.appendChild(cardItemNode);
        });
        
        playlistDeckWrapper.appendChild(virtualDOMFragmentBlock);
    }

    searchBar.addEventListener('input', function(eventProperty) {
        const parsedSearchQueryText = eventProperty.target.value.toLowerCase().trim();
        
        displayedChannels = rawChannelsDatabase.filter(channelRecordItem => {
            const validationMatchName = channelRecordItem.name.toLowerCase().includes(parsedSearchQueryText);
            const validationMatchGroup = channelRecordItem.group && channelRecordItem.group.toLowerCase().includes(parsedSearchQueryText);
            return validationMatchName || validationMatchGroup;
        });
        
        activeChannelIndex = -1; 
        renderPlaylistDeckCardsUI();
    });

    drawerToggleBtn.addEventListener('click', () => {
        appSidebar.classList.toggle('expanded');
    });

    fullscreenToggleBtn.addEventListener('click', () => {
        const activeContainerTargetBox = document.getElementById('videoContainerBox');
        if (!document.fullscreenElement) {
            activeContainerTargetBox.requestFullscreen().catch(err => console.error(err.message));
        } else {
            document.exitFullscreen();
        }
    });

    langToggleBtn.addEventListener('click', () => {
        currentLanguage = currentLanguage === 'bn' ? 'en' : 'bn';
        langToggleBtn.innerText = currentLanguage === 'bn' ? 'EN' : 'BN';
        
        const langPackageScope = localizationDictionary[currentLanguage];
        searchBar.placeholder = langPackageScope.searchPlaceholder;
        document.getElementById('langTvText').innerText = langPackageScope.tvText;
        document.getElementById('langFacebookText').innerText = langPackageScope.facebookText;
        document.getElementById('langDeckTitle').innerText = langPackageScope.deckTitle;
        
        if (activeChannelIndex === -1) {
            currentStationTitle.innerText = langPackageScope.noSelectTitle;
            currentStationGenre.innerText = langPackageScope.noSelectGenre;
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadM3uDatabaseAsyncStream();
    });
</script>
</body>
</html>
